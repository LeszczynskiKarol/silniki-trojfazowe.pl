version: 0.2

env:
  variables:
    S3_BUCKET: "www.silniki-trojfazowe.pl"
    CF_DIST_ID: "E2Q8CBRHCSGB32"
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd frontend && npm ci

  build:
    commands:
      - npm run build

  post_build:
    commands:
      - aws s3 sync dist/ s3://${S3_BUCKET}/ --delete --cache-control "no-cache" --exclude "*" --include "*.html" --region eu-north-1
      - aws s3 sync dist/ s3://${S3_BUCKET}/ --delete --cache-control "public,max-age=31536000,immutable" --exclude "*.html" --region eu-north-1
      - aws cloudfront create-invalidation --distribution-id ${CF_DIST_ID} --paths "/*" --output text
